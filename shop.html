<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Bienen-Projekt</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-flowers">
    <header>
      <nav>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="shop.html" aria-current="page">Shop</a>
          <a href="about.html">About</a>
          <a href="pictures.html">Pictures</a>
          <a href="donate.html">FundMe</a>
        </div>

        <div class="nav-socials">
          <a
            href="https://instagram.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" class="social-icon">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
          <a
            href="https://youtube.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="YouTube"
          >
            <svg viewBox="0 0 24 24" class="social-icon">
              <path
                d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"
              ></path>
              <polygon
                points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"
              ></polygon>
            </svg>
          </a>
          <a
            href="https://tiktok.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="TikTok"
          >
            <svg viewBox="0 0 24 24" class="social-icon">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
            </svg>
          </a>
        </div>
      </nav>
    </header>

    <main class="shop-main">
      <div class="insect-layer" aria-hidden="true">
        <div class="bee" style="--x: 20%; --y: 30%">🐝</div>
        <div class="bee" style="--x: 75%; --y: 20%">🐝</div>
        <div class="bumblebee" style="--x: 40%; --y: 70%">🐝</div>
      </div>

      <section class="content-section shop-content">
        <h1>Unser Shop</h1>
        <p>
          Hier entstehen bald tolle Produkte, um das Bienen-Projekt zu
          unterstützen. Stay tuned!
        </p>
      </section>
    </main>
  </body>
</html>
