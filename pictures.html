<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pictures - Bienen-Projekt</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-flowers">
    <header>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="pictures.html" aria-current="page">Pictures</a>
        <a href="donate.html">Donate</a>
      </nav>
    </header>

    <main>
      <div class="insect-layer" aria-hidden="true">
        <div class="bee" style="--x: 5%; --y: 15%">🐝</div>
        <div class="bee" style="--x: 85%; --y: 25%">🐝</div>
        <div class="bee" style="--x: 20%; --y: 65%">🐝</div>
        <div class="bee" style="--x: 75%; --y: 75%">🐝</div>
        <div class="bumblebee" style="--x: 45%; --y: 80%">🐝</div>
      </div>

      <section class="content-section gallery-container">
        <h1>Bildergalerie</h1>
        <p class="gallery-subtitle">
          Hier siehst du die Blumen, die durch eure Spenden gepflanzt wurden!
        </p>

        <div class="image-grid">
          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1560717789-0ac7c58ac90a?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 1"
            />
            <div class="image-caption">München - Wildblumen</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1533038590840-1cde6e668a91?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 2"
            />
            <div class="image-caption">Berlin - Sonnenblumenbeet</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1550950158-d0d960dff51b?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 3"
            />
            <div class="image-caption">Hamburg - Krokusse</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 4"
            />
            <div class="image-caption">Köln - Bienenweide</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 5"
            />
            <div class="image-caption">Stuttgart - Klatschmohn</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=500&q=80"
              alt="Gepflanzte Blume 6"
            />
            <div class="image-caption">Frankfurt - Lavendelfeld</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
