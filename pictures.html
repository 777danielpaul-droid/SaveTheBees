    <main>
      <div class="insect-layer" aria-hidden="true">
        <div class="bee" style="--x: 5%; --y: 15%">🐝</div>
        <div class="bee" style="--x: 85%; --y: 25%">🐝</div>
        <div class="bee" style="--x: 20%; --y: 65%">🐝</div>
        <div class="bee" style="--x: 75%; --y: 75%">🐝</div>
        <div class="bumblebee" style="--x: 45%; --y: 80%">🐝</div>
      </div>

      <section class="content-section gallery-container">
        <h1>Galeria</h1>
        <p class="gallery-subtitle">
          Beispielhafte Kunstwerke, die Blumen und Bienen huldigen
        </p>

        <div class="image-grid">
          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=500&auto=format&fit=crop"
              alt="Abstrakte bunte Kunstblumen"
            />
            <div class="image-caption">Flowers</div>
          </div>

          <div class="gallery-item">
            <img
              src="orchid.png"
              alt="Aufwendig digital gestaltete leuchtende Neon-Orchidee"
            />
            <div class="image-caption">Orchid</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=500&auto=format&fit=crop"
              alt="Intensiv leuchtende Pflanze im Neon-Stil"
            />
            <div class="image-caption">leaves</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=500&auto=format&fit=crop"
              alt="Klassisch-ästhetisches Blumenbild"
            />
            <div class="image-caption">Flora</div>
          </div>

          <div class="gallery-item">
            <img
              src="sunflower.png"
              alt="Künstlerische digitale Vaporwave-Sonnenblume"
            />
            <div class="image-caption">Sunflower</div>
          </div>

          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1579783928621-7a13d66a62d1?q=80&w=500&auto=format&fit=crop"
              alt="Moderne farbenfrohe Grafik einer Blume"
            />
            <div class="image-caption">flower</div>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
