<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startseite - Bienen & Neon-Falter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-sunset">
    <header>
      <nav>
        <a href="index.html" aria-current="page">Home</a>
        <a href="about.html">About</a>
        <a href="pictures.html">Pictures</a>
        <a href="donate.html">Donate</a>
      </nav>
    </header>

    <main>
      <div class="sun-rays-container" aria-hidden="true">
        <div class="ray" style="--i: 1"></div>
        <div class="ray" style="--i: 2"></div>
        <div class="ray" style="--i: 3"></div>
        <div class="ray" style="--i: 4"></div>
        <div class="ray" style="--i: 5"></div>
        <div class="ray" style="--i: 6"></div>
        <div class="ray" style="--i: 7"></div>
        <div class="ray" style="--i: 8"></div>
      </div>

      <section class="text-container">
        <h1 class="animated-text txt-1">Save the bees!</h1>
        <p class="animated-text txt-2">plant flowers....</p>
        <p class="animated-text txt-3">Bee humble....</p>
        <p class="animated-text txt-4">and donate if you can....</p>
        <p class="animated-text txt-5">Thank you so much!!!!</p>
      </section>

      <div class="insect-layer" aria-hidden="true">
        <div class="bee" style="--x: 10%; --y: 20%">🐝</div>
        <div class="bee" style="--x: 70%; --y: 40%">🐝</div>
        <div class="bee" style="--x: 30%; --y: 70%">🐝</div>
        <div class="bee" style="--x: 80%; --y: 20%">🐝</div>
        <div class="bumblebee" style="--x: 20%; --y: 60%">🐝</div>
        <div class="bumblebee" style="--x: 50%; --y: 80%">🐝</div>
      </div>

      <div class="butterfly" aria-hidden="true">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient
              id="fluegelBasis"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="100%"
            >
              <stop offset="0%" stop-color="#002233" />
              <stop offset="100%" stop-color="#00ffff" />
            </linearGradient>
            <linearGradient
              id="falterKoerper"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="0%"
            >
              <stop offset="0%" stop-color="#050505" />
              <stop offset="100%" stop-color="#000000" />
            </linearGradient>
            <filter id="ghostGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="0.8" result="blur1" />
              <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>

            <g id="einzelFluegel">
              <path
                d="M 200 200 C 150 130, 80 100, 50 140 C 30 170, 70 230, 200 230 Z"
                fill="url(#fluegelBasis)"
                stroke="#000"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <path
                d="M 200 230 C 130 230, 70 260, 90 310 C 110 340, 160 320, 200 245 Z"
                fill="url(#fluegelBasis)"
                stroke="#000"
                stroke-width="4"
                stroke-linejoin="round"
              />

              <g filter="url(#ghostGlow)">
                <circle cx="160" cy="180" r="2.5" fill="#560bad" />
                <circle cx="145" cy="170" r="3.0" fill="#7209b7" />
                <circle cx="130" cy="165" r="3.5" fill="#b5179e" />
                <circle cx="115" cy="160" r="4.0" fill="#4a00e0" />
                <circle cx="100" cy="160" r="4.0" fill="#7209b7" />
                <circle cx="85" cy="165" r="3.5" fill="#3f37c9" />
                <circle cx="75" cy="172" r="3.0" fill="#4361ee" />
                <circle cx="78" cy="188" r="2.5" fill="#4cc9f0" />
                <circle cx="170" cy="195" r="2.5" fill="#00f5d4" />
                <circle cx="150" cy="190" r="3.0" fill="#00ffff" />
                <circle cx="130" cy="185" r="3.5" fill="#00bbf9" />
                <circle cx="110" cy="180" r="4.0" fill="#00bbf9" />
                <circle cx="92" cy="182" r="3.5" fill="#7209b7" />
                <circle cx="80" cy="192" r="3.0" fill="#3f37c9" />
                <circle cx="165" cy="210" r="2.5" fill="#00ffff" />
                <circle cx="145" cy="208" r="3.0" fill="#00bbf9" />
                <circle cx="125" cy="205" r="3.5" fill="#3f37c9" />
                <circle cx="105" cy="205" r="3.0" fill="#7209b7" />
                <circle cx="90" cy="210" r="2.5" fill="#560bad" />
                <circle cx="145" cy="152" r="2.0" fill="#00ffff" />
                <circle cx="125" cy="148" r="2.5" fill="#00ffff" />
                <circle cx="105" cy="145" r="3.0" fill="#3a86c8" />
                <circle cx="88" cy="148" r="2.5" fill="#3f37c9" />
                <circle cx="75" cy="155" r="2.0" fill="#7209b7" />

                <circle cx="175" cy="240" r="2.2" fill="#00f5d4" />
                <circle cx="155" cy="245" r="2.8" fill="#00bbf9" />
                <circle cx="135" cy="250" r="3.2" fill="#7209b7" />
                <circle cx="118" cy="258" r="3.5" fill="#560bad" />
                <circle cx="105" cy="270" r="3.0" fill="#00ffff" />
                <circle cx="100" cy="285" r="2.5" fill="#00f5d4" />
                <circle cx="170" cy="255" r="2.2" fill="#7209b7" />
                <circle cx="150" cy="265" r="2.8" fill="#560bad" />
                <circle cx="132" cy="272" r="3.2" fill="#3f37c9" />
                <circle cx="118" cy="282" r="2.8" fill="#4361ee" />
                <circle cx="112" cy="298" r="2.2" fill="#4cc9f0" />
                <circle cx="160" cy="275" r="2.2" fill="#00ffff" />
                <circle cx="142" cy="285" r="2.8" fill="#00bbf9" />
                <circle cx="128" cy="295" r="2.5" fill="#3f37c9" />
                <circle cx="162" cy="295" r="2.0" fill="#3a86c8" />
                <circle cx="145" cy="305" r="2.2" fill="#7209b7" />
              </g>
            </g>
          </defs>

          <g class="falter-schweben">
            <use href="#einzelFluegel" class="links" />
            <use href="#einzelFluegel" class="rechts" />

            <g class="falter-rumpf">
              <path
                d="M 200 210 C 193 230, 193 300, 200 330 C 207 300, 207 230, 200 210 Z"
                fill="url(#falterKoerper)"
                stroke="#000"
              />
              <path
                d="M 196 192 C 188 158, 160 138, 150 143"
                stroke="#000000"
                stroke-width="2"
                fill="none"
              />
              <path
                d="M 204 192 C 212 158, 240 138, 250 143"
                stroke="#000000"
                stroke-width="2"
                fill="none"
              />
              <circle
                cx="150"
                cy="143"
                r="3.5"
                fill="#00ffff"
                filter="url(#ghostGlow)"
              />
              <circle
                cx="250"
                cy="143"
                r="3.5"
                fill="#00ffff"
                filter="url(#ghostGlow)"
              />
              <circle cx="200" cy="192" r="9" fill="#050505" stroke="#000" />
              <circle cx="194" cy="190" r="2.2" fill="#00ffff" />
              <circle cx="206" cy="190" r="2.2" fill="#00ffff" />
            </g>
          </g>
        </svg>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
